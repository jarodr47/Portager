name: Build and Push

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-push:
    name: Build and push container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/portager
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign container image
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0.23.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/portager@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom-spdx.json

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0.23.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/portager@${{ steps.build-push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: Attach SBOM attestations to image
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson \
            --predicate sbom-spdx.json \
            "ghcr.io/${{ github.repository_owner }}/portager@${DIGEST}"
          cosign attest --yes --type cyclonedx \
            --predicate sbom-cyclonedx.json \
            "ghcr.io/${{ github.repository_owner }}/portager@${DIGEST}"

      - name: Upload SBOMs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "${TAG}" --generate-notes || true
          gh release upload "${TAG}" sbom-spdx.json sbom-cyclonedx.json --clobber

      - name: Package and push Helm chart
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          helm package helm/portager/
          helm push portager-*.tgz oci://ghcr.io/${{ github.repository_owner }}/portager/charts
