image:
  repository: ghcr.io/jarodr47/portager
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

leaderElection:
  enabled: true

metrics:
  enabled: true
  serviceMonitor:
    enabled: false  # requires Prometheus Operator CRDs

serviceAccount:
  create: true
  name: ""  # defaults to release fullname
  annotations: {}
  # For EKS IRSA:
  # eks.amazonaws.com/role-arn: arn:aws:iam::role/portager-ecr-role

aws:
  # For non-EKS clusters: inject AWS credentials as env vars
  credentials:
    enabled: false
    accessKeyId: ""
    secretAccessKey: ""
    region: "us-east-1"
  # Reference an existing Secret containing AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
  existingSecret: ""

# -- Scheduling

nodeSelector: {}
  # disktype: ssd

tolerations: []
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "portager"
  #   effect: "NoSchedule"

affinity: {}
  # podAntiAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     - labelSelector:
  #         matchExpressions:
  #           - key: app.kubernetes.io/name
  #             operator: In
  #             values:
  #               - portager
  #       topologyKey: kubernetes.io/hostname

topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: portager

priorityClassName: ""
  # Recommended for production: system-cluster-critical

# -- Pod metadata and pull secrets

podAnnotations: {}

podLabels: {}

imagePullSecrets: []
  # - name: my-registry-secret

# -- Extra container and volume configuration

extraEnv: []
  # - name: MY_VAR
  #   value: my-value

extraVolumes: []
  # - name: tmp
  #   emptyDir: {}

extraVolumeMounts: []
  # - name: tmp
  #   mountPath: /tmp

# -- Disruption and probes

podDisruptionBudget:
  enabled: false
  minAvailable: 1

startupProbe:
  enabled: false

terminationGracePeriodSeconds: 10
