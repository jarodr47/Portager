# This rule is not used by the project portage itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the portager.portager.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: portage
    app.kubernetes.io/managed-by: kustomize
  name: imagesync-editor-role
rules:
- apiGroups:
  - portager.portager.io
  resources:
  - imagesyncs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - portager.portager.io
  resources:
  - imagesyncs/status
  verbs:
  - get
