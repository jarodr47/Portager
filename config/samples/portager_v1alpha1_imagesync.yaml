apiVersion: portager.portager.io/v1alpha1
kind: ImageSync
metadata:
  labels:
    app.kubernetes.io/name: portage
    app.kubernetes.io/managed-by: kustomize
  name: imagesync-sample
  namespace: default
spec:
  schedule: "@every 1h"
  source:
    registry: docker.io/library
  destination:
    registry: localhost:5001
    auth:
      method: secret
      # No secretRef — local registry has no auth.
      # The controller falls through to anonymous when secretRef is nil.
  images:
    - name: alpine
      tags:
        - "latest"
